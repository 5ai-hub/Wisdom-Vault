<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wisdom">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Wisdom Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1927;
    --surface2: #221f35;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #fffffe;
    --muted: rgba(255,255,255,0.45);
    --hint: rgba(255,255,255,0.22);
    --accent: #ff8906;
    --accent2: #e53170;
    --accent3: #a7c4bc;
    --gold: #f2c14e;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
  
  /* App shell */
  #app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}
  
  /* Animated bg */
  .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.12;pointer-events:none;z-index:0}
  .orb1{width:400px;height:400px;background:var(--accent2);top:-100px;right:-100px;animation:float1 12s ease-in-out infinite}
  .orb2{width:350px;height:350px;background:var(--accent);bottom:-80px;left:-80px;animation:float2 15s ease-in-out infinite}
  .orb3{width:250px;height:250px;background:#6246ea;top:40%;left:40%;animation:float3 10s ease-in-out infinite}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,30px)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-25px)}}
  @keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,20px)}}
  
  /* Views */
  .view{position:absolute;inset:0;display:flex;flex-direction:column;z-index:1;opacity:0;pointer-events:none;transform:translateY(12px);transition:opacity 0.3s ease,transform 0.3s ease}
  .view.active{opacity:1;pointer-events:all;transform:translateY(0)}

  /* Header */
  .top-bar{padding:env(safe-area-inset-top,16px) 20px 0;padding-top:max(env(safe-area-inset-top),16px)}
  .top-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px}
  .app-title{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:-0.5px}
  .app-title span{color:var(--accent)}
  .icon-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border2);background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:18px;transition:all 0.2s}
  .icon-btn:hover{background:rgba(255,255,255,0.12)}

  /* Stats bar */
  .stats-row{display:flex;gap:10px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none}
  .stats-row::-webkit-scrollbar{display:none}
  .stat-chip{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:8px 16px;display:flex;align-items:center;gap:8px}
  .stat-chip .num{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--accent)}
  .stat-chip .lbl{font-size:12px;color:var(--muted);font-weight:300}

  /* Filter pills */
  .pills-row{display:flex;gap:8px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none}
  .pills-row::-webkit-scrollbar{display:none}
  .pill{flex-shrink:0;padding:7px 16px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--sans);transition:all 0.2s;font-weight:400}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#0f0e17;font-weight:500}

  /* Cards scroll */
  .cards-scroll{flex:1;overflow-y:auto;padding:0 20px;scrollbar-width:none;padding-bottom:100px}
  .cards-scroll::-webkit-scrollbar{display:none}
  .cards-inner{display:flex;flex-direction:column;gap:14px;padding-bottom:20px}

  /* Wisdom card */
  .wcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
  .wcard::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.2s;background:linear-gradient(135deg,rgba(255,137,6,0.06),rgba(229,49,112,0.06))}
  .wcard:hover::before,.wcard:active::before{opacity:1}
  .wcard:active{transform:scale(0.985)}
  .wcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px}
  .cat-badge{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:500;letter-spacing:0.3px;text-transform:uppercase}
  .cat-life{background:rgba(242,193,78,0.15);color:var(--gold)}
  .cat-mindset{background:rgba(98,70,234,0.2);color:#a78bfa}
  .cat-work{background:rgba(255,137,6,0.15);color:var(--accent)}
  .cat-health{background:rgba(167,196,188,0.15);color:var(--accent3)}
  .cat-general{background:rgba(255,255,255,0.08);color:var(--muted)}
  .fav-btn{background:none;border:none;cursor:pointer;font-size:20px;line-height:1;padding:0;transition:transform 0.2s;flex-shrink:0}
  .fav-btn:active{transform:scale(1.3)}
  .wcard-quote{font-family:var(--serif);font-size:15px;line-height:1.7;color:rgba(255,255,255,0.88);margin-bottom:12px;font-style:italic}
  .wcard-source{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .wcard-source::before{content:'';width:16px;height:1px;background:var(--hint)}

  /* Empty state */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;text-align:center}
  .empty-icon{font-size:48px;opacity:0.3}
  .empty-title{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--muted)}
  .empty-sub{font-size:14px;color:var(--hint);line-height:1.6;max-width:260px}

  /* FAB */
  .fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 28px);right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 24px rgba(255,137,6,0.35);transition:transform 0.2s,box-shadow 0.2s}
  .fab:active{transform:scale(0.92);box-shadow:0 2px 12px rgba(255,137,6,0.25)}

  /* Bottom sheet overlay */
  .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(4px)}
  .sheet-overlay.open{opacity:1;pointer-events:all}
  .sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface2);border-radius:24px 24px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);padding-bottom:env(safe-area-inset-bottom,20px);max-height:92vh;overflow-y:auto}
  .sheet.open{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:14px auto 20px}
  .sheet-title{font-family:var(--serif);font-size:22px;font-weight:600;padding:0 24px;margin-bottom:24px}
  .field{padding:0 24px;margin-bottom:18px}
  .field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:8px;font-weight:500}
  .field textarea,.field input,.field select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:14px;font-size:15px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color 0.2s;-webkit-appearance:none}
  .field textarea{min-height:110px;resize:none;font-family:var(--serif);font-style:italic;line-height:1.65}
  .field textarea:focus,.field input:focus,.field select:focus{border-color:var(--accent)}
  .field select{background-color:var(--surface);appearance:none;-webkit-appearance:none}
  .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 24px;margin-bottom:24px}
  .cat-opt{padding:10px 6px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--muted);font-size:12px;font-weight:500;text-align:center;cursor:pointer;transition:all 0.2s;font-family:var(--sans);text-transform:uppercase;letter-spacing:0.4px}
  .cat-opt.selected{border-color:var(--accent);color:var(--accent);background:rgba(255,137,6,0.1)}
  .sheet-actions{display:flex;gap:10px;padding:0 24px 8px}
  .btn-cancel{flex:1;padding:15px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:15px;cursor:pointer;font-family:var(--sans)}
  .btn-save{flex:2;padding:15px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:opacity 0.2s}
  .btn-save:active{opacity:0.85}

  /* Detail view */
  .detail-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:40px}
  .detail-scroll::-webkit-scrollbar{display:none}
  .detail-hero{padding:24px 24px 32px;position:relative}
  .detail-cat{margin-bottom:20px}
  .detail-quote{font-family:var(--serif);font-size:22px;font-weight:400;line-height:1.7;font-style:italic;color:var(--text);margin-bottom:28px;position:relative;padding-left:20px}
  .detail-quote::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:linear-gradient(var(--accent),var(--accent2));border-radius:99px}
  .detail-source{font-size:14px;color:var(--muted);margin-bottom:8px}
  .detail-source strong{color:var(--text);font-weight:500}
  .detail-date{font-size:12px;color:var(--hint)}
  .detail-note-card{margin:0 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
  .detail-note-label{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.6px;font-weight:500;margin-bottom:8px}
  .detail-note-text{font-size:14px;color:rgba(255,255,255,0.75);line-height:1.65}
  .detail-actions{display:flex;gap:10px;padding:24px}
  .btn-del{flex:1;padding:14px;border-radius:var(--radius-sm);border:1px solid rgba(229,49,112,0.3);background:rgba(229,49,112,0.08);color:var(--accent2);font-size:14px;cursor:pointer;font-family:var(--sans)}
  .btn-done{flex:2;padding:14px;border-radius:var(--radius-sm);border:none;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-size:14px;cursor:pointer;font-family:var(--sans)}

  /* Search */
  .search-wrap{padding:0 20px 12px;position:relative}
  .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:11px 18px 11px 42px;font-size:14px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color 0.2s}
  .search-wrap input:focus{border-color:var(--border2)}
  .search-wrap::before{content:'🔍';position:absolute;left:34px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0.4;pointer-events:none}

  /* Motivational header accent */
  .motto{padding:0 20px 20px;font-family:var(--serif);font-size:13px;font-style:italic;color:var(--hint)}
  .motto span{color:var(--accent);font-style:normal}

  /* Daily spark */
  .spark-card{margin:0 20px 20px;background:linear-gradient(135deg,rgba(255,137,6,0.12),rgba(229,49,112,0.12));border:1px solid rgba(255,137,6,0.2);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all 0.2s}
  .spark-card:active{transform:scale(0.98)}
  .spark-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:500;margin-bottom:10px}
  .spark-text{font-family:var(--serif);font-size:15px;font-style:italic;color:rgba(255,255,255,0.85);line-height:1.65}
  .spark-author{font-size:12px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div id="app">
  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="top-bar">
      <div class="top-inner">
        <div class="app-title">Wisdom<span>.</span></div>
        <button class="icon-btn" onclick="toggleSearch()" aria-label="Search">🔍</button>
      </div>
    </div>
    <div class="motto">Every entry is a step toward the person you're becoming <span>↑</span></div>

    <div id="spark-wrap"></div>

    <div class="stats-row">
      <div class="stat-chip"><span class="num" id="stat-total">0</span><span class="lbl">entries</span></div>
      <div class="stat-chip"><span class="num" id="stat-fav">0</span><span class="lbl">favourites</span></div>
      <div class="stat-chip"><span class="num" id="stat-streak">0</span><span class="lbl">categories</span></div>
    </div>

    <div id="search-bar" style="display:none">
      <div class="search-wrap"><input type="text" id="search-input" placeholder="Search your wisdom…" oninput="renderCards()"></div>
    </div>

    <div class="pills-row" id="pills-row"></div>
    <div class="cards-scroll"><div class="cards-inner" id="cards-inner"></div></div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="view-detail">
    <div class="top-bar">
      <div class="top-inner">
        <button class="icon-btn" onclick="showHome()" aria-label="Back">←</button>
        <button class="fav-btn" id="detail-fav-btn" onclick="toggleFavDetail()">🤍</button>
      </div>
    </div>
    <div class="detail-scroll">
      <div class="detail-hero">
        <div class="detail-cat" id="detail-cat"></div>
        <p class="detail-quote" id="detail-quote"></p>
        <div class="detail-source">— <strong id="detail-source"></strong></div>
        <div class="detail-date" id="detail-date"></div>
      </div>
      <div class="detail-note-card" id="detail-note-card" style="display:none">
        <div class="detail-note-label">✦ My reflection</div>
        <div class="detail-note-text" id="detail-note-text"></div>
      </div>
      <div class="detail-actions">
        <button class="btn-del" onclick="deleteEntry()">Delete</button>
        <button class="btn-done" onclick="showHome()">← Back to vault</button>
      </div>
    </div>
  </div>
</div>

<!-- Add sheet -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Add wisdom ✦</div>
  <div class="field">
    <label>The wisdom</label>
    <textarea id="f-text" placeholder="Paste or write the quote, lesson, or pep talk…"></textarea>
  </div>
  <div class="field">
    <label>Source</label>
    <input type="text" id="f-source" placeholder="Author, book, post, conversation…">
  </div>
  <div class="field">
    <label>My reflection (optional)</label>
    <input type="text" id="f-note" placeholder="Why does this hit different for you?">
  </div>
  <div class="field"><label>Category</label></div>
  <div class="cat-grid" id="cat-grid"></div>
  <div class="sheet-actions">
    <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
    <button class="btn-save" onclick="saveEntry()">Save it ✦</button>
  </div>
</div>

<button class="fab" id="fab" onclick="openSheet()" aria-label="Add wisdom">+</button>

<script>
const CATS = ['Life','Mindset','Work','Health','General'];
const CAT_CLASS = {Life:'cat-life',Mindset:'cat-mindset',Work:'cat-work',Health:'cat-health',General:'cat-general'};
const CAT_EMOJI = {Life:'✨',Mindset:'🧠',Work:'🔥',Health:'💚',General:'💫'};
const FILTERS = ['All','Favourites',...CATS];

let entries = [];
let activeFilter = 'All';
let selectedCat = 'Life';
let currentId = null;
let searchVisible = false;

function load(){
  try{ entries = JSON.parse(localStorage.getItem('wisdom-entries')||'[]'); }catch(e){ entries=[]; }
  if(!entries.length) seedSample();
  render();
}

function save(){
  localStorage.setItem('wisdom-entries', JSON.stringify(entries));
}

function seedSample(){
  entries = [{
    id: Date.now(),
    text: `My definition of rest is not a slow pace. For me, rest means eating well, sleeping well and exercising well, and then going on to do what I love. Because I am always switching, I like each field even more and feel more relaxed.`,
    source: 'Eileen Gu',
    note: 'Switching between passions is itself a form of rest — this changed how I see my day',
    category: 'Life',
    fav: true,
    date: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
  }];
  save();
}

function render(){
  renderStats();
  renderPills();
  renderCards();
  renderSpark();
}

function renderStats(){
  document.getElementById('stat-total').textContent = entries.length;
  document.getElementById('stat-fav').textContent = entries.filter(e=>e.fav).length;
  document.getElementById('stat-streak').textContent = new Set(entries.map(e=>e.category)).size;
}

function renderPills(){
  document.getElementById('pills-row').innerHTML = FILTERS.map(f=>
    `<button class="pill${activeFilter===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`
  ).join('');
}

function setFilter(f){ activeFilter=f; renderPills(); renderCards(); }

function filtered(){
  const q = (document.getElementById('search-input')?.value||'').toLowerCase();
  return entries.filter(e=>{
    if(activeFilter==='Favourites'&&!e.fav) return false;
    if(activeFilter!=='All'&&activeFilter!=='Favourites'&&e.category!==activeFilter) return false;
    if(q&&!e.text.toLowerCase().includes(q)&&!e.source.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderCards(){
  const list = filtered();
  const c = document.getElementById('cards-inner');
  if(!list.length){
    c.innerHTML = `<div class="empty"><div class="empty-icon">✦</div><div class="empty-title">Nothing here yet</div><div class="empty-sub">Tap the + button to add your first piece of wisdom</div></div>`;
    return;
  }
  c.innerHTML = list.map(e=>{
    const preview = e.text.length>180 ? e.text.slice(0,177)+'…' : e.text;
    return `<div class="wcard" onclick="openDetail(${e.id})">
      <div class="wcard-top">
        <span class="cat-badge ${CAT_CLASS[e.category]}">${CAT_EMOJI[e.category]} ${e.category}</span>
        <button class="fav-btn" onclick="event.stopPropagation();toggleFav(${e.id})" aria-label="Favourite">${e.fav?'🧡':'🤍'}</button>
      </div>
      <p class="wcard-quote">${preview}</p>
      <div class="wcard-source">${e.source||'Unknown'}</div>
    </div>`;
  }).join('');
}

function renderSpark(){
  const wrap = document.getElementById('spark-wrap');
  if(!entries.length){ wrap.innerHTML=''; return; }
  const favs = entries.filter(e=>e.fav);
  const pool = favs.length ? favs : entries;
  const e = pool[Math.floor(Math.random()*pool.length)];
  const preview = e.text.length>120 ? e.text.slice(0,117)+'…' : e.text;
  wrap.innerHTML = `<div class="spark-card" onclick="openDetail(${e.id})">
    <div class="spark-label">✦ Daily spark</div>
    <div class="spark-text">${preview}</div>
    <div class="spark-author">— ${e.source||'Unknown'}</div>
  </div>`;
}

function toggleFav(id){
  const e = entries.find(x=>x.id===id);
  if(e){ e.fav=!e.fav; save(); render(); }
}

function openDetail(id){
  currentId = id;
  const e = entries.find(x=>x.id===id);
  if(!e) return;
  document.getElementById('detail-cat').innerHTML = `<span class="cat-badge ${CAT_CLASS[e.category]}">${CAT_EMOJI[e.category]} ${e.category}</span>`;
  document.getElementById('detail-quote').textContent = e.text;
  document.getElementById('detail-source').textContent = e.source||'Unknown';
  document.getElementById('detail-date').textContent = e.date||'';
  document.getElementById('detail-fav-btn').textContent = e.fav?'🧡':'🤍';
  const nc = document.getElementById('detail-note-card');
  if(e.note){ document.getElementById('detail-note-text').textContent=e.note; nc.style.display=''; }
  else nc.style.display='none';
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  document.getElementById('fab').style.display='none';
}

function showHome(){
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('view-home').classList.add('active');
  document.getElementById('fab').style.display='flex';
  currentId=null; render();
}

function toggleFavDetail(){
  const e = entries.find(x=>x.id===currentId);
  if(e){ e.fav=!e.fav; save(); document.getElementById('detail-fav-btn').textContent=e.fav?'🧡':'🤍'; renderStats(); }
}

function deleteEntry(){
  entries = entries.filter(x=>x.id!==currentId);
  save(); showHome();
}

function openSheet(){
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  renderCatGrid();
}

function closeSheet(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function renderCatGrid(){
  document.getElementById('cat-grid').innerHTML = CATS.map(c=>
    `<button class="cat-opt${selectedCat===c?' selected':''}" onclick="selectCat('${c}')">${CAT_EMOJI[c]} ${c}</button>`
  ).join('');
}

function selectCat(c){ selectedCat=c; renderCatGrid(); }

function saveEntry(){
  const text = document.getElementById('f-text').value.trim();
  if(!text) return;
  entries.unshift({
    id: Date.now(),
    text,
    source: document.getElementById('f-source').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    category: selectedCat,
    fav: false,
    date: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
  });
  save();
  document.getElementById('f-text').value='';
  document.getElementById('f-source').value='';
  document.getElementById('f-note').value='';
  closeSheet();
  render();
}

function toggleSearch(){
  searchVisible=!searchVisible;
  const bar = document.getElementById('search-bar');
  bar.style.display = searchVisible?'block':'none';
  if(searchVisible) document.getElementById('search-input').focus();
  else{ document.getElementById('search-input').value=''; renderCards(); }
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

load();
</script>
</body>
</html>
